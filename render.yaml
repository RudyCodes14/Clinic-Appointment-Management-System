# Render Blueprint — deploy this repo as a Python web service.
# In Render: New + → Blueprint → pick this repo. (Or create a Web Service
# manually and copy the build/start commands below.)
services:
  - type: web
    name: clinic-appointment-management-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
