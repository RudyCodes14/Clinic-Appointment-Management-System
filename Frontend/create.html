{% extends "base.html" %}
{% set active_page = 'book' %}
{% block title %}Book Appointment · CareFlow Clinic{% endblock %}

{% block content %}
<div class="page-head">
    <h3>Schedule a Clinical Appointment</h3>
    <div class="subtitle">Pick a doctor and a time window that works for you.</div>
</div>

<div class="card card-glass" style="max-width:640px;">
    {% if error %}
        <div class="error-box">{{ error }}</div>
    {% endif %}

    <form action="/appointment/book" method="post">
        <div class="form-group">
            <label>Choose Doctor</label>
            <select name="doctor_name" required>
                <option value="Smith (Cardiology)">Dr. Smith — Cardiology</option>
                <option value="Davis (Pediatrics)">Dr. Davis — Pediatrics</option>
                <option value="Jone (General Medicine)">Dr. Jone — General Medicine</option>
            </select>
        </div>

        <div class="form-group">
            <label>Preferred Date &amp; Appointment Window</label>
            <input type="datetime-local" name="appointment_date" required>
        </div>

        <div class="form-group">
            <label>Briefly Explain Symptoms</label>
            <textarea name="symptoms" rows="4" placeholder="Mention reasons or descriptions..." required></textarea>
        </div>

        <button type="submit" class="btn btn-block">Confirm Safe Booking</button>
    </form>
</div>
{% endblock %}
