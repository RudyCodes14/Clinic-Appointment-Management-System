{% extends "base.html" %}
{% set active_page = 'appointments' %}
{% block title %}Update Clinical Sheet · CareFlow Clinic{% endblock %}

{% block content %}
<div class="page-head">
    <h3>Add Clinical Charts &amp; Observations</h3>
    <div class="subtitle">Patient ID Assignment Reference: <span class="hl">#{{ appointment.patient_id }}</span></div>
</div>

<div class="card" style="max-width:680px;">
    <form action="/appointment/update/{{ appointment.id }}" method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label>Session Management Status</label>
            <select name="status">
                <option value="Scheduled" {% if appointment.status == 'Scheduled' %}selected{% endif %}>Scheduled</option>
                <option value="Completed" {% if appointment.status == 'Completed' %}selected{% endif %}>Completed</option>
                <option value="Cancelled" {% if appointment.status == 'Cancelled' %}selected{% endif %}>Cancelled</option>
            </select>
        </div>

        <div class="form-group">
            <label>Official Diagnosis</label>
            <textarea name="diagnosis" rows="4" required>{{ record.diagnosis if record else '' }}</textarea>
        </div>

        <div class="form-group">
            <label>Prescriptions &amp; Treatment Strategy</label>
            <textarea name="prescription" rows="4" required>{{ record.prescription if record else '' }}</textarea>
        </div>

        <div class="form-group">
            <label>Upload Diagnostic Scans / Lab PDF Reports (Optional)</label>
            <input type="file" name="file">
        </div>

        <button type="submit" class="btn btn-block">Update &amp; Save Records</button>
    </form>
</div>
{% endblock %}
