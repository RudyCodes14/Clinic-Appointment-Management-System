<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareFlow Clinic - Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <h2>CareFlow Clinic</h2>
        <div>
            <a href="/signup">Sign Up</a>
        </div>
    </nav>

    <div class="container" style="max-width: 450px;">
        <div class="card">
            <h3 style="text-align: center; margin-bottom: 1.5rem;">Account Sign In</h3>
            
            {% if error %}
                <div style="background-color: #fee2e2; color: #991b1b; padding: 0.75rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.9rem; font-weight: 500;">
                    {{ error }}
                </div>
            {% endif %}

            <form action="/login" method="post">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="patient@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem; padding: 0.75rem;">Sign In</button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: #64748b;">
                New to the clinic? <a href="/signup" style="color: var(--primary); text-decoration: none; font-weight: 500;">Create an account</a>
            </p>
        </div>
    </div>
</body>
</html>
