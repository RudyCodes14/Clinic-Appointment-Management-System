<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account · CareFlow Clinic</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <h2>CareFlow Clinic</h2>
        <div>
            <a href="/login">Login</a>
        </div>
    </nav>

    <div class="auth-wrap">
        <div class="card auth-card">
            <div class="brand-badge">＋</div>
            <h3>Create your account</h3>
            <p class="tagline">Join CareFlow Clinic in a few seconds</p>

            {% if error %}
                <div class="error-box">{{ error }}</div>
            {% endif %}

            <form action="/signup" method="post">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john.doe@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label for="role">Account Type / Portal</label>
                    <select id="role" name="role" required>
                        <option value="patient">Patient</option>
                        <option value="doctor">Doctor / Healthcare Provider</option>
                        <option value="staff">Clinic Frontdesk Staff</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-block">Register Account</button>
            </form>

            <p class="auth-foot">
                Already have an account? <a href="/login">Sign in here</a>
            </p>
        </div>
    </div>
</body>
</html>
