<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Appointment</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <h2>CareFlow Clinic</h2>
        <a href="/dashboard">Back to Dashboard</a>
    </nav>
    <div class="container" style="max-width:600px;">
        <div class="card">
            <h3>Schedule Clinical Appointment</h3>
            {% if error %}
                <p style="color:red; font-weight:bold;">{{ error }}</p>
            {% endif %}
            <form action="/appointment/book" method="post">
                <div class="form-group">
                    <label>Choose Doctor</label>
                    <select name="doctor_name" required>
                        <option value="Smith (Cardiology)">Dr. Smith - Cardiology</option>
                        <option value="Davis (Pediatrics)">Dr. Davis - Pediatrics</option>
                        <option value="Jone (General Medicine)">Dr. Jone - General Medicine</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Preferred Date & Appointment window</label>
                    <input type="datetime-local" name="appointment_date" required>
                </div>
                <div class="form-group">
                    <label>Briefly Explain Symptoms</label>
                    <textarea name="symptoms" rows="4" placeholder="Mention reasons or descriptions..." required></textarea>
                </div>
                <button type="submit" class="btn">Confirm Safe Booking</button>
            </form>
        </div>
    </div>
</body>
</html>
